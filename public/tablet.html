<!DOCTYPE html>
<html lang="it-IT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>EMBER+ Tablet Controller</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --accent: #10b981;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.45);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-bg: rgba(15, 23, 42, 0.6);
        }

        body.theme-light {
            --bg-dark: #f1f5f9;
            --glass-bg: rgba(255, 255, 255, 0.85);
            --glass-border: rgba(0, 0, 0, 0.08);
            --text-main: #0f172a;
            --text-muted: #475569;
            --sidebar-bg: rgba(226, 232, 240, 0.9);
        }

        body.tablet-view {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            font-family: 'Inter', sans-serif;
            color: var(--text-main);
            height: 100vh;
            overflow: hidden;
        }

        .tablet-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Glassmorphism Sidebar */
        .tablet-sidebar {
            width: 260px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            gap: 20px;
            z-index: 10;
            flex-shrink: 0;
            transition: width 0.25s ease, padding 0.25s ease, opacity 0.25s ease, border-color 0.25s ease;
            overflow: hidden;
        }

        .tablet-container.sidebar-collapsed .tablet-sidebar {
            width: 0;
            padding: 20px 0;
            padding-left: 0;
            padding-right: 0;
            opacity: 0;
            border-right: none;
            pointer-events: none;
        }

        .sidebar-header {
            display: flex;
            flex-direction: column;
            gap: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            padding-bottom: 16px;
        }

        .tablet-title {
            font-size: 1.3rem;
            font-weight: 800;
            background: linear-gradient(90deg, #3b82f6, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
        }

        .layout-recall-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 12px;
            overflow-y: auto;
        }

        .layout-recall-section h3 {
            margin: 0;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .layout-buttons-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .btn-layout-recall {
            width: 100%;
            padding: 14px 16px;
            font-size: 0.95rem;
            font-weight: 700;
            background: rgba(59, 130, 246, 0.08);
            border: 1px solid rgba(59, 130, 246, 0.2);
            color: #60a5fa;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            transition: all 0.15s ease;
        }

        .btn-layout-recall:hover {
            background: rgba(59, 130, 246, 0.15);
        }

        .btn-layout-recall:active, .btn-layout-recall.active {
            background: var(--primary);
            color: white;
            box-shadow: 0 0 14px rgba(59, 130, 246, 0.4);
            border-color: var(--primary);
        }

        .sidebar-footer {
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            padding-top: 16px;
        }

        .btn-nav {
            display: block;
            text-align: center;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            padding: 12px;
            border-radius: 8px;
            font-size: 0.9rem;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.15s ease;
        }

        .btn-nav:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Workspace Layout */
        .tablet-workspace {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 16px;
            overflow: hidden;
            box-sizing: border-box;
        }

        /* Selection and Action Bar */
        .workspace-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 24px;
            background: var(--glass-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            gap: 20px;
        }

        .selection-info {
            display: flex;
            gap: 32px;
            flex: 1;
        }

        .info-block {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .info-block .label {
            font-size: 0.72rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
        }

        .info-block .value {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text-main);
            max-width: 220px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .take-controls {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        /* Take & Undo buttons */
        .secondary-btn, .take-btn {
            padding: 12px 24px;
            font-size: 0.95rem;
            font-weight: 700;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.15s ease;
            border: none;
        }

        .secondary-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: var(--text-main);
        }

        .secondary-btn.primary-btn {
            background: var(--primary);
            border: 1px solid var(--primary);
            color: white;
        }

        .secondary-btn.disabled, .take-btn.disabled {
            background: rgba(255, 255, 255, 0.03) !important;
            border: 1px solid rgba(255, 255, 255, 0.05) !important;
            color: rgba(255, 255, 255, 0.2) !important;
            cursor: not-allowed;
            box-shadow: none !important;
        }

        .take-btn {
            background: var(--accent);
            color: #0f172a;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
        }

        .take-btn:not(.disabled):hover {
            background: #059669;
            box-shadow: 0 4px 16px rgba(16, 185, 129, 0.35);
        }

        /* Matrix Grid Layout */
        .grid-container {
            flex: 1;
            overflow: auto;
            background: rgba(15, 23, 42, 0.3);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            padding: 16px;
            box-sizing: border-box;
            position: relative;
        }

        .matrix-grid {
            width: 100%;
            height: 100%;
        }

        .placeholder-text {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .matrix-wrapper {
            position: relative;
            display: inline-block;
        }

        .grid-header-row {
            display: flex;
            margin-left: 155px; /* Matches row-label width */
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--bg-dark);
            padding-bottom: 4px;
        }

        .grid-row {
            display: flex;
            align-items: center;
            margin-bottom: 4px;
        }

        .row-label {
            width: 155px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            position: sticky;
            left: 0;
            z-index: 5;
            background: var(--bg-dark);
            border-right: 1px solid rgba(255, 255, 255, 0.12);
            box-sizing: border-box;
            padding-right: 8px;
            flex-shrink: 0;
        }

        .port-config {
            width: 130px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
            border-radius: 6px;
            flex-shrink: 0;
        }

        .header-port {
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.05);
            margin-right: 4px;
        }

        .crosspoint {
            width: 130px;
            height: 48px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            background: rgba(255, 255, 255, 0.08);
            cursor: pointer;
            box-sizing: border-box;
            transition: all 0.1s ease;
            flex-shrink: 0;
            margin-right: 4px;
            border-radius: 6px;
        }

        .crosspoint:active {
            transform: scale(0.96);
        }

        .crosspoint.selected {
            background: rgba(59, 130, 246, 0.25) !important;
            border: 2px solid var(--primary) !important;
        }

        .crosspoint.active {
            background: var(--accent) !important;
            box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
        }

        /* Hover highlight style */
        .hover-highlight {
            background-color: var(--danger) !important;
            color: white !important;
        }
        .hover-highlight select.name-select {
            color: white !important;
        }

        /* Name Select overrides */
        select.name-select {
            background: transparent !important;
            border: none !important;
            color: inherit;
            cursor: pointer;
            font-weight: 700;
            padding: 4px 6px !important;
            width: 100%;
            height: 100%;
            text-align: center;
            text-align-last: center;
            font-size: 0.76rem;
            border-radius: 6px;
            outline: none;
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
        }

        select.name-select option {
            background: #1e293b !important;
            color: var(--text-main) !important;
            font-weight: normal;
        }

        /* Light Theme Elements Overrides */
        body.theme-light select.name-select option {
            background: #ffffff !important;
            color: #0f172a !important;
        }

        body.theme-light .grid-container {
            background: #ffffff;
            border-color: #cbd5e1;
        }

        body.theme-light .grid-header-row {
            background: #e2e8f0;
        }

        body.theme-light .row-label {
            background: #e2e8f0;
            border-right: 1px solid #cbd5e1;
        }

        body.theme-light .header-port {
            border: 1px solid #64748b;
            background: #ffffff;
        }

        body.theme-light .crosspoint {
            border: 1px solid #64748b;
            background: #ffffff;
        }

        body.theme-light .crosspoint.active {
            background: var(--accent) !important;
        }

        body.theme-light .crosspoint.selected {
            background: rgba(59, 130, 246, 0.25) !important;
            border: 2px solid var(--primary) !important;
        }

        body.theme-light .btn-layout-recall {
            background: rgba(59, 130, 246, 0.05);
            border: 1px solid rgba(59, 130, 246, 0.15);
            color: #1e3a8a;
        }
        body.theme-light .btn-layout-recall:hover {
            background: rgba(59, 130, 246, 0.1);
        }
        body.theme-light .btn-layout-recall.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        body.theme-light .btn-nav {
            background: rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.08);
            color: #0f172a;
        }
        body.theme-light .btn-nav:hover {
            background: rgba(0, 0, 0, 0.06);
        }

        body.theme-light .secondary-btn.disabled,
        body.theme-light .take-btn.disabled {
            background: rgba(0, 0, 0, 0.04) !important;
            border: 1px solid rgba(0, 0, 0, 0.08) !important;
            color: rgba(0, 0, 0, 0.25) !important;
        }

        /* Status Indicators */
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .dot {
            height: 8px;
            width: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .dot.green { background-color: var(--accent); box-shadow: 0 0 8px var(--accent); }
        .dot.red { background-color: var(--danger); box-shadow: 0 0 8px var(--danger); }
        
        /* Custom scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.1);
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Drag and Drop styles */
        .dragging {
            opacity: 0.5;
            transform: scale(0.95);
        }
        .drag-over {
            border: 2px dashed #10b981 !important;
            background: rgba(16, 185, 129, 0.1) !important;
        }
        .row-label[draggable="true"], .header-port[draggable="true"] {
            cursor: grab;
        }
        .row-label[draggable="true"]:active, .header-port[draggable="true"]:active {
            cursor: grabbing;
        }
    
    .modal-overlay {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: rgba(0,0,0,0.7);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(5px);
    }
    .modal-content {
        background: rgba(255,255,255,0.05);
        padding: 30px;
        border-radius: 12px;
        border: 1px solid rgba(255,255,255,0.1);
        width: 90%;
        max-width: 400px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .modal-content h2 { margin: 0; font-size: 1.8rem; }
    .snap-btn {
        background: rgba(255,255,255,0.1);
        border: 1px solid rgba(255,255,255,0.2);
        color: white;
        padding: 20px;
        font-size: 1.5rem;
        border-radius: 8px;
        cursor: pointer;
        transition: background 0.2s;
        text-align: left;
    }
    .snap-btn:hover {
        background: rgba(255,255,255,0.2);
    }
    
    
        .crosspoint.preview {
            background: rgba(245, 158, 11, 0.2) !important;
            border: 2px solid #f59e0b !important;
            box-shadow: inset 0 0 10px rgba(245, 158, 11, 0.4);
        }
        
        body.theme-light .crosspoint.preview {
            background: rgba(245, 158, 11, 0.4) !important;
            border: 2px solid #d97706 !important;
        }
        .color-pickers-container {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 2px;
            opacity: 0.15;
            transition: opacity 0.2s ease;
        }
        .port-config:hover .color-pickers-container,
        .row-label:hover .color-pickers-container {
            opacity: 1;
        }
        .color-picker {
            -webkit-appearance: none;
            -moz-appearance: none;
            appearance: none;
            border: none;
            width: 14px;
            height: 14px;
            background: transparent;
            cursor: pointer;
            padding: 0;
            transition: transform 0.1s ease;
        }
        .color-picker:hover {
            transform: scale(1.2);
        }
        .color-picker::-webkit-color-swatch-wrapper {
            padding: 0;
        }
        .color-picker::-webkit-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        .color-picker::-moz-color-swatch {
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 50%;
        }
        
    </style>
    <link rel="icon" type="image/jpeg" href="ico.jpg">
</head>
<body class="tablet-view">
    <div id="app" class="tablet-container">
        <!-- Sidebar per Tablet (Layout e Connessione) -->
        <aside class="tablet-sidebar">
            <div class="sidebar-header">
                <span class="tablet-title">EMBER+ MATRIX</span>
                <div class="status-indicator">
                    <span id="connection-dot" class="dot red"></span>
                    <span id="connection-text" style="font-size: 0.82rem;">Disconnected</span>
                </div>
            </div>
            
            <section class="layout-recall-section">
                <h3>Quick Layouts</h3>
                <div id="layout-buttons-list" class="layout-buttons-grid">
                    <div style="color: var(--text-muted); font-size: 0.85rem;">Loading layouts...</div>
                </div>
            </section>

            <div class="sidebar-footer">
                <button id="btn-fullscreen" class="btn-nav" style="width: 100%; margin-bottom: 8px; background: rgba(59, 130, 246, 0.15); border: 1px solid rgba(59, 130, 246, 0.3); color: #60a5fa; cursor: pointer;">📺 Full Screen</button>
                <a href="index.html" class="btn-nav">← Full Panel</a>
            </div>
        </aside>

        <main class="tablet-workspace">
            <div class="workspace-header">
                <!-- Bottone per collassare/espandere la barra laterale -->
                <button id="btn-toggle-sidebar" class="secondary-btn" style="padding: 10px 16px; font-size: 1.1rem; line-height: 1; margin-right: 12px;" title="Show/Hide Menu">☰</button>
                <div class="selection-info">
                    <div class="info-block">
                        <span class="label">DESTINATION (OUT)</span>
                        <span id="selected-out" class="value">-</span>
                    </div>
                    <div class="info-block">
                        <span class="label">CURRENT CONNECTION</span>
                        <span id="current-connection" class="value">-</span>
                    </div>
                    <div class="info-block">
                        <span class="label">NEW INPUT (IN)</span>
                        <span id="selected-in" class="value" style="color: #60a5fa;">-</span>
                    </div>
                </div>
                <div class="take-controls" style="display: flex; align-items: center; gap: 8px;">
                    
                    <button id="btn-save-snap-tablet" class="header-btn" style="background: transparent; color: white; border: none; font-size: 1.5rem; cursor: pointer;" title="Save Snapshot">💾</button>
                    <button id="btn-recall-snap-tablet" class="header-btn" style="background: transparent; color: white; border: none; font-size: 1.5rem; margin-right: 15px; cursor: pointer;" title="Recall Snapshot">📂</button>
                    <button id="btn-sort-toggle" class="secondary-btn" style="padding: 10px 14px; font-size: 1.1rem; line-height: 1; cursor: pointer; transition: all 0.2s;" title="Sort dropdown alphabetically">A-Z</button>
                    <div id="btn-trash" class="secondary-btn" style="padding: 10px 14px; font-size: 1.1rem; line-height: 1; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s;" title="Drag rows or columns here to delete">🗑️</div>
                    <button id="btn-theme-toggle" class="secondary-btn" style="padding: 10px 14px; font-size: 1.1rem; line-height: 1; cursor: pointer;" title="Change Theme">☀️</button>
                    <button id="btn-undo" class="secondary-btn disabled">UNDO</button>
                    <button id="btn-take" class="take-btn disabled">TAKE</button>
                </div>
            </div>

            <!-- Griglia allineata dall'inizio della pagina di lavoro -->
            <div class="grid-container">
                <div id="matrix-grid" class="matrix-grid">
                    <div class="placeholder-text">Select a layout on the left to view the grid</div>
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden elements required by core logic -->
    <input type="checkbox" id="matrix-extended" style="display: none;">
    <input type="number" id="matrix-inputs" style="display: none;">
    <input type="number" id="matrix-outputs" style="display: none;">

    
    <!-- Save Snapshot Modal -->
    <div id="modal-save-snap" class="modal-overlay">
        <div class="modal-content glass">
            <h2>Save Snapshot</h2>
            <input type="text" id="tablet-snap-name" placeholder="Enter Snapshot Name..." style="width: 100%; padding: 15px; font-size: 1.2rem; margin-top: 15px; border-radius: 8px; border: none; background: rgba(0,0,0,0.5); color: white;">
            <div style="display: flex; gap: 15px; margin-top: 25px;">
                <button id="btn-confirm-save-snap" class="primary-btn" style="flex: 1; padding: 15px; font-size: 1.2rem; cursor: pointer;">Save</button>
                <button id="btn-cancel-save-snap" class="secondary-btn outline" style="flex: 1; padding: 15px; font-size: 1.2rem; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Recall Snapshot Modal -->
    <div id="modal-recall-snap" class="modal-overlay">
        <div class="modal-content glass" style="max-width: 600px;">
            <h2>Recall Snapshot</h2>
            <div id="tablet-snap-list" style="display: flex; flex-direction: column; gap: 10px; margin-top: 15px; max-height: 50vh; overflow-y: auto; padding-right: 10px;">
                <!-- Snapshot buttons injected here -->
            </div>
            <div style="margin-top: 25px;">
                <button id="btn-cancel-recall-snap" class="secondary-btn outline" style="width: 100%; padding: 15px; font-size: 1.2rem; cursor: pointer;">Cancel</button>
            </div>
        </div>
    </div>
    
    <script src="socket.io.min.js"></script>
    <script src="tablet.js"></script>
</body>
</html>
